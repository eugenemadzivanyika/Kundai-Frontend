<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Assessment Detail</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; }
  :root { --border: #e2e8f0; --muted: #94a3b8; --blue: #2563eb; --blue-light: #eff6ff; --emerald: #10b981; --red: #ef4444; --amber: #f59e0b; }
  button { cursor: pointer; font-family: inherit; }
  input, select, textarea { font-family: inherit; outline: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--blue) !important; box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
  .btn { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:8px; font-size:13px; font-weight:500; border:1.5px solid transparent; transition:all 0.12s; }
  .btn-ghost { background:white; border-color:var(--border); color:#334155; }
  .btn-ghost:hover { background:#f1f5f9; }
  .btn-primary { background:var(--blue); color:white; }
  .btn-primary:hover { background:#1d4ed8; }
  .btn:disabled { opacity:0.55; pointer-events:none; }
  .input-sm { width:100%; border:1.5px solid var(--border); border-radius:8px; background:white; padding:7px 10px; font-size:13px; color:#1e293b; transition:border-color 0.12s; }
  .card { background:white; border:1.5px solid var(--border); border-radius:12px; }
  .trow { border-bottom:1px solid #f1f5f9; transition:background 0.1s; }
  .trow:hover { background:#f8fafc; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }
  .fade-in { animation: fadeIn 0.15s ease; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .spin { animation: spin 1s linear infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

// ── Sample data ─────────────────────────────────────────────────────────────
const ASSESSMENT = {
  _id:'a1', name:'Photosynthesis Unit Test', type:'Test', status:'published',
  totalPoints:100, difficulty:'medium', dueDate:'2026-05-10T00:00:00Z',
  createdAt:'2026-04-01T00:00:00Z',
  questions:[
    { _id:'q1', text:'What is the primary purpose of photosynthesis in plants?', type:'multiple_choice', options:['To produce oxygen','To convert light energy into chemical energy','To absorb water from soil','To regulate temperature'], correctAnswer:'To convert light energy into chemical energy', maxPoints:2, primaryAttributeId:'a1', tags:['biology','core'] },
    { _id:'q2', text:'Plants are the only organisms capable of photosynthesis.', type:'true_false', options:['True','False'], correctAnswer:'False', maxPoints:1, primaryAttributeId:'a2', tags:['true/false'] },
    { _id:'q3', text:'Briefly explain the role of chlorophyll in photosynthesis.', type:'short_answer', options:[], correctAnswer:'Chlorophyll absorbs light energy and uses it to drive the light-dependent reactions of photosynthesis.', maxPoints:3, primaryAttributeId:'a1', tags:['essay'] },
    { _id:'q4', text:'Which of the following is a product of the light-dependent reactions?', type:'multiple_choice', options:['Glucose','ATP','Carbon dioxide','Water'], correctAnswer:'ATP', maxPoints:2, primaryAttributeId:'a3', tags:['biology'] },
    { _id:'q5', text:'The Calvin cycle occurs in the stroma of the chloroplast.', type:'true_false', options:['True','False'], correctAnswer:'True', maxPoints:1, primaryAttributeId:'a2', tags:[] },
    { _id:'q6', text:'Describe the relationship between photosynthesis and cellular respiration.', type:'essay', options:[], correctAnswer:'Photosynthesis produces glucose and oxygen; cellular respiration consumes them to produce ATP, CO₂, and water.', maxPoints:5, primaryAttributeId:'a3', tags:['essay','advanced'] },
  ],
};

const ATTRIBUTES = { a1:'Critical Thinking', a2:'Problem Solving', a3:'Communication' };

const RESULTS = [
  { _id:'r1', student:{_id:'s1',firstName:'Amara',lastName:'Chikwanda'}, actualMark:74, percentage:74, status:'Released', gradeType:'Teacher Reviewed', teacherFeedback:'Good understanding of light reactions. Needs more detail on Calvin cycle.', aiGradingSuggestion:{totalScore:72,confidenceScore:0.91,overallFeedback:'Good understanding overall.'}, submittedAt:'2026-05-10T09:12:00Z', answers:['To convert light energy into chemical energy','False','Chlorophyll captures sunlight.','ATP','True','Photosynthesis and respiration are opposite processes.'] },
  { _id:'r2', student:{_id:'s2',firstName:'Tendai',lastName:'Moyo'}, actualMark:88, percentage:88, status:'Released', gradeType:'Teacher Reviewed', teacherFeedback:'Excellent work. Strong grasp of all concepts.', aiGradingSuggestion:{totalScore:88,confidenceScore:0.95,overallFeedback:'Excellent.'}, submittedAt:'2026-05-10T08:45:00Z', answers:['To convert light energy into chemical energy','False','Chlorophyll is the pigment that absorbs light energy, initiating the light-dependent reactions.','ATP','True','Photosynthesis captures CO₂ and produces glucose; respiration breaks down glucose releasing CO₂ and ATP.'] },
  { _id:'r3', student:{_id:'s3',firstName:'Rudo',lastName:'Ncube'}, actualMark:52, percentage:52, status:'Pending Teacher Review', gradeType:'AI Suggested', teacherFeedback:'', aiGradingSuggestion:{totalScore:52,confidenceScore:0.58,overallFeedback:'Partial understanding of Calvin cycle. Needs improvement.'}, submittedAt:'2026-05-10T10:01:00Z', answers:['To produce oxygen','True','Chlorophyll is green.','Glucose','True','They are both about plants.'] },
  { _id:'r4', student:{_id:'s4',firstName:'Farai',lastName:'Dube'}, actualMark:91, percentage:91, status:'Released', gradeType:'MCQ Graded', teacherFeedback:'Top performer. Outstanding essay response.', aiGradingSuggestion:{totalScore:90,confidenceScore:0.98,overallFeedback:'Excellent.'}, submittedAt:'2026-05-10T07:30:00Z', answers:['To convert light energy into chemical energy','False','Chlorophyll absorbs red and blue light, reflecting green, and uses energy to drive photosystems.','ATP','True','Photosynthesis converts light energy into chemical energy stored in glucose, while cellular respiration releases that energy as ATP.'] },
  { _id:'r5', student:{_id:'s5',firstName:'Ngoni',lastName:'Mutasa'}, actualMark:38, percentage:38, status:'Pending Teacher Review', gradeType:'AI Suggested', teacherFeedback:'', aiGradingSuggestion:{totalScore:40,confidenceScore:0.44,overallFeedback:'Major gaps detected in understanding.'}, submittedAt:'2026-05-10T11:15:00Z', answers:['To absorb water from soil','True','Chlorophyll makes food.','Carbon dioxide','False','I am not sure.'] },
];

const TYPE_META = {
  multiple_choice: { label:'Multiple choice', chipClass:'mc', bg:'#ede9fe', text:'#6d28d9' },
  true_false:      { label:'True / False',    chipClass:'tf', bg:'#fef3c7', text:'#92400e' },
  short_answer:    { label:'Short answer',    chipClass:'sa', bg:'#dcfce7', text:'#166534' },
  essay:           { label:'Essay',           chipClass:'es', bg:'#fce7f3', text:'#9d174d' },
};
const STATUS_CONFIG = {
  published:{ color:'#10b981', bg:'#ecfdf5', text:'#065f46' },
  draft:    { color:'#f59e0b', bg:'#fffbeb', text:'#78350f' },
  archived: { color:'#94a3b8', bg:'#f1f5f9', text:'#475569' },
};
const GRADE_TYPE_STYLE = {
  'AI Suggested':    { bg:'#f3e8ff', text:'#6d28d9' },
  'AI + MCQ Graded': { bg:'#ede9fe', text:'#5b21b6' },
  'MCQ Graded':      { bg:'#dbeafe', text:'#1e40af' },
  'Teacher Reviewed':{ bg:'#dcfce7', text:'#166534' },
};
const fmtDate = v => v ? new Date(v).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—';
const fmtDT = v => v ? new Date(v).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';

// ── Icons ──────────────────────────────────────────────────────────────────
const Icon = ({ name, size=15 }) => {
  const d = {
    arrowLeft: <><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></>,
    edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
    save: <><path d="M19 21H5a2 2 0 0 0-2-2V5a2 2 0 0 0 2-2h11l5 5v11a2 2 0 0 0-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>,
    check: <><polyline points="20 6 9 17 4 12"/></>,
    user: <><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
    file: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></>,
    list: <><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></>,
    sparkles: <><path d="M12 3l1.09 3.26L16 7.5l-2.91 1.24L12 12l-1.09-3.26L8 7.5l2.91-1.24L12 3z"/><path d="M19 13l.73 2.18L22 16l-2.27.82L19 19l-.73-2.18L16 16l2.27-.82L19 13z"/></>,
    loader: <><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></>,
    x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
  };
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{d[name]}</svg>;
};

// ── Toast ──────────────────────────────────────────────────────────────────
function Toast({ msg, type='success', onDone }) {
  React.useEffect(() => { const t = setTimeout(onDone, 2500); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position:'fixed', bottom:20, right:20, zIndex:200, background:'#1e293b', color:'white', padding:'9px 16px', borderRadius:9, fontSize:13, fontWeight:500, boxShadow:'0 6px 20px rgba(0,0,0,0.2)' }}>
      {type === 'success' ? '✓ ' : '✕ '}{msg}
    </div>
  );
}

// ── Questions Tab ──────────────────────────────────────────────────────────
function QuestionsTab({ questions, results }) {
  const [selectedResultId, setSelectedResultId] = useState(results[0]?._id ?? '');
  const [editMark, setEditMark] = useState(0);
  const [editFeedback, setEditFeedback] = useState('');
  const [saving, setSaving] = useState(false);
  const [toast, setToast] = useState(null);

  const selectedResult = useMemo(() => results.find(r => r._id === selectedResultId) ?? results[0] ?? null, [results, selectedResultId]);

  React.useEffect(() => {
    if (!selectedResult) return;
    setEditMark(selectedResult.actualMark ?? selectedResult.aiGradingSuggestion?.totalScore ?? 0);
    setEditFeedback(selectedResult.teacherFeedback ?? selectedResult.aiGradingSuggestion?.overallFeedback ?? '');
  }, [selectedResult]);

  const handleSave = async () => {
    setSaving(true);
    await new Promise(r => setTimeout(r, 700));
    setSaving(false);
    setToast('Feedback saved.');
  };

  const pct = selectedResult ? Math.round((selectedResult.actualMark / ASSESSMENT.totalPoints) * 100) : 0;
  const scoreColor = pct >= 60 ? '#10b981' : pct >= 40 ? '#f59e0b' : '#ef4444';

  return (
    <div style={{ flex:1, minHeight:0, display:'flex', gap:10 }}>
      {/* Left: question list */}
      <div className="card" style={{ width:340, flexShrink:0, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <div style={{ padding:'10px 14px', borderBottom:'1px solid var(--border)', flexShrink:0 }}>
          <span style={{ fontSize:11, fontWeight:700, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'0.05em' }}>Questions ({questions.length})</span>
        </div>
        <div style={{ flex:1, overflowY:'auto', padding:'8px' }}>
          {questions.map((q, i) => {
            const tm = TYPE_META[q.type] ?? TYPE_META.short_answer;
            return (
              <div key={q._id} style={{ padding:'10px 12px', borderRadius:9, border:'1.5px solid var(--border)', marginBottom:6, background:'#fafbfc' }}>
                <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:8, marginBottom:6 }}>
                  <span style={{ fontSize:10, fontWeight:700, color:'var(--muted)' }}>Q{i+1}</span>
                  <div style={{ display:'flex', gap:4 }}>
                    <span style={{ fontSize:10, fontWeight:700, padding:'2px 7px', borderRadius:20, background:tm.bg, color:tm.text }}>{tm.label}</span>
                    <span style={{ fontSize:10, color:'var(--muted)', padding:'2px 6px', borderRadius:6, background:'#f1f5f9' }}>{q.maxPoints}pt</span>
                  </div>
                </div>
                <p style={{ fontSize:12, fontWeight:500, color:'#334155', lineHeight:1.5, marginBottom:6 }}>{q.text}</p>
                {q.options?.length > 0 && (
                  <div style={{ display:'flex', flexDirection:'column', gap:3 }}>
                    {q.options.map((opt, oi) => (
                      <div key={oi} style={{ fontSize:11, padding:'3px 8px', borderRadius:5, background: opt === q.correctAnswer ? '#ecfdf5' : 'transparent', color: opt === q.correctAnswer ? '#065f46' : '#64748b', fontWeight: opt === q.correctAnswer ? 600 : 400, border: opt === q.correctAnswer ? '1px solid #bbf7d0' : '1px solid transparent' }}>
                        {String.fromCharCode(65+oi)}. {opt} {opt === q.correctAnswer && '✓'}
                      </div>
                    ))}
                  </div>
                )}
                {q.correctAnswer && q.options?.length === 0 && (
                  <div style={{ fontSize:11, padding:'5px 8px', borderRadius:5, background:'#ecfdf5', color:'#065f46', border:'1px solid #bbf7d0', lineHeight:1.5 }}>
                    <span style={{ fontWeight:700 }}>Model: </span>{q.correctAnswer}
                  </div>
                )}
                {q.primaryAttributeId && (
                  <div style={{ marginTop:5, fontSize:10, color:'#7c3aed', background:'#f3e8ff', padding:'2px 7px', borderRadius:20, display:'inline-block' }}>
                    {ATTRIBUTES[q.primaryAttributeId] ?? q.primaryAttributeId}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* Right: student grading panel */}
      <div className="card" style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        {/* Student selector header */}
        <div style={{ padding:'10px 16px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:10, flexShrink:0 }}>
          <Icon name="user" size={14} />
          <span style={{ fontSize:11, fontWeight:700, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'0.05em' }}>Student Review</span>
          <select value={selectedResultId} onChange={e => setSelectedResultId(e.target.value)}
            style={{ marginLeft:'auto', border:'1.5px solid var(--border)', borderRadius:7, fontSize:12, padding:'4px 8px', color:'#334155', background:'white' }}>
            {results.map(r => <option key={r._id} value={r._id}>{r.student.firstName} {r.student.lastName}</option>)}
          </select>
        </div>

        {selectedResult ? (
          <div style={{ flex:1, overflowY:'auto', display:'flex', flexDirection:'column', gap:0 }}>
            {/* Score strip */}
            <div style={{ padding:'12px 16px', background:'#f8fafc', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:14 }}>
              <div style={{ textAlign:'center', background:scoreColor+'15', borderRadius:10, padding:'10px 16px', border:`1.5px solid ${scoreColor}30` }}>
                <div style={{ fontSize:22, fontWeight:800, color:scoreColor, lineHeight:1 }}>{selectedResult.actualMark}</div>
                <div style={{ fontSize:10, color:'var(--muted)', marginTop:2 }}>/ {ASSESSMENT.totalPoints}</div>
              </div>
              <div style={{ flex:1 }}>
                <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:6 }}>
                  <span style={{ fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:20, ...(GRADE_TYPE_STYLE[selectedResult.gradeType]??{bg:'#f1f5f9',text:'#475569'}) }}>{selectedResult.gradeType}</span>
                  <span style={{ fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:20, background: selectedResult.status === 'Released' ? '#ecfdf5' : '#fffbeb', color: selectedResult.status === 'Released' ? '#065f46' : '#92400e' }}>{selectedResult.status}</span>
                </div>
                <div style={{ fontSize:11, color:'var(--muted)' }}>Submitted {fmtDT(selectedResult.submittedAt)}</div>
                {selectedResult.aiGradingSuggestion?.confidenceScore > 0 && (
                  <div style={{ fontSize:11, color:'#7c3aed', marginTop:2 }}>
                    AI confidence: <b>{Math.round(selectedResult.aiGradingSuggestion.confidenceScore * 100)}%</b>
                    {selectedResult.aiGradingSuggestion.totalScore != null && ` · suggested ${selectedResult.aiGradingSuggestion.totalScore}pts`}
                  </div>
                )}
              </div>
            </div>

            {/* Per-question answers */}
            <div style={{ padding:'12px 16px', borderBottom:'1px solid var(--border)' }}>
              <div style={{ fontSize:11, fontWeight:700, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:8 }}>Answers</div>
              <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                {ASSESSMENT.questions.map((q, i) => {
                  const studentAnswer = selectedResult.answers?.[i] ?? '—';
                  const isCorrect = q.options?.length > 0 ? studentAnswer === q.correctAnswer : null;
                  return (
                    <div key={q._id} style={{ display:'flex', gap:10, alignItems:'flex-start', padding:'8px 10px', borderRadius:8, background: isCorrect === true ? '#f0fdf4' : isCorrect === false ? '#fef2f2' : '#f8fafc', border:`1px solid ${isCorrect === true ? '#bbf7d0' : isCorrect === false ? '#fecaca' : 'var(--border)'}` }}>
                      <span style={{ fontSize:10, fontWeight:700, color:'var(--muted)', minWidth:20 }}>Q{i+1}</span>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:11, color:'#334155', lineHeight:1.5 }}>{studentAnswer}</div>
                        {isCorrect === false && (
                          <div style={{ fontSize:10, color:'#065f46', marginTop:3 }}>Correct: {q.correctAnswer}</div>
                        )}
                      </div>
                      {isCorrect !== null && (
                        <div style={{ width:18, height:18, borderRadius:'50%', background: isCorrect ? '#ecfdf5' : '#fef2f2', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                          <span style={{ fontSize:10 }}>{isCorrect ? '✓' : '✗'}</span>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Edit mark + feedback */}
            <div style={{ padding:'12px 16px' }}>
              <div style={{ fontSize:11, fontWeight:700, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:10 }}>Grade & Feedback</div>
              <div style={{ display:'flex', gap:10, marginBottom:10 }}>
                <div style={{ width:100 }}>
                  <label style={{ fontSize:11, color:'var(--muted)', fontWeight:600, display:'block', marginBottom:4 }}>Mark</label>
                  <input type="number" value={editMark} onChange={e => setEditMark(Number(e.target.value)||0)}
                    className="input-sm" style={{ fontSize:14, fontWeight:700, textAlign:'center' }} />
                </div>
                <div style={{ flex:1 }}>
                  <label style={{ fontSize:11, color:'var(--muted)', fontWeight:600, display:'block', marginBottom:4 }}>Teacher feedback</label>
                  <textarea value={editFeedback} onChange={e => setEditFeedback(e.target.value)}
                    style={{ width:'100%', border:'1.5px solid var(--border)', borderRadius:8, padding:'7px 10px', fontSize:12, lineHeight:1.6, resize:'vertical', minHeight:80, background:'white' }} />
                </div>
              </div>
              <div style={{ display:'flex', justifyContent:'flex-end', gap:8 }}>
                {selectedResult.status !== 'Released' && (
                  <button className="btn btn-ghost" style={{ fontSize:12 }} onClick={handleSave}>
                    Save draft
                  </button>
                )}
                <button className="btn btn-primary" style={{ fontSize:12 }} disabled={saving} onClick={handleSave}>
                  {saving ? <><Icon name="loader" size={13} className="spin" /> Saving…</> : <><Icon name="check" size={13} /> {selectedResult.status === 'Released' ? 'Update' : 'Approve & Release'}</>}
                </button>
              </div>
            </div>
          </div>
        ) : (
          <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', color:'var(--muted)', fontSize:13 }}>No results yet.</div>
        )}
      </div>

      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
    </div>
  );
}

// ── Submissions Tab ────────────────────────────────────────────────────────
function SubmissionsTab({ results, onReview }) {
  const [page, setPage] = useState(1);
  const pageSize = 8;
  const total = results.length;
  const totalPages = Math.ceil(total / pageSize);
  const paginated = results.slice((page-1)*pageSize, page*pageSize);

  return (
    <div className="card" style={{ flex:1, minHeight:0, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      <div style={{ padding:'10px 16px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
        <span style={{ fontSize:11, fontWeight:700, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'0.05em' }}>All submissions ({total})</span>
        <div style={{ display:'flex', gap:8, fontSize:11, color:'var(--muted)' }}>
          <span><b style={{ color:'#10b981' }}>{results.filter(r=>r.status==='Released').length}</b> released</span>
          <span><b style={{ color:'#f59e0b' }}>{results.filter(r=>r.status==='Pending Teacher Review').length}</b> pending</span>
        </div>
      </div>
      <div style={{ flex:1, overflowY:'auto', overflowX:'auto' }}>
        <table style={{ width:'100%', minWidth:700, borderCollapse:'collapse' }}>
          <thead>
            <tr style={{ background:'#f8fafc', borderBottom:'1.5px solid var(--border)' }}>
              {['Student','Submitted','Mark','Status','Grade type','Feedback',''].map((h,i) => (
                <th key={h} style={{ padding:'8px 14px', fontSize:11, fontWeight:700, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'0.04em', textAlign:i>=6?'right':'left', whiteSpace:'nowrap' }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {paginated.map(r => {
              const pct = Math.round((r.actualMark / ASSESSMENT.totalPoints)*100);
              const gt = GRADE_TYPE_STYLE[r.gradeType] ?? { bg:'#f1f5f9', text:'#475569' };
              const sb = r.status === 'Released' ? { dot:'#10b981', text:'#065f46' } : r.status === 'Pending Teacher Review' ? { dot:'#f59e0b', text:'#92400e' } : { dot:'#6366f1', text:'#4338ca' };
              return (
                <tr key={r._id} className="trow">
                  <td style={{ padding:'9px 14px' }}>
                    <div style={{ fontSize:13, fontWeight:600, color:'#0f172a' }}>{r.student.firstName} {r.student.lastName}</div>
                  </td>
                  <td style={{ padding:'9px 14px', fontSize:12, color:'#475569' }}>{fmtDT(r.submittedAt)}</td>
                  <td style={{ padding:'9px 14px' }}>
                    <span style={{ fontSize:13, fontWeight:700, color: pct>=60?'#065f46':pct>=40?'#92400e':'#991b1b' }}>{r.actualMark}</span>
                    <span style={{ fontSize:11, color:'var(--muted)' }}> / {ASSESSMENT.totalPoints}</span>
                  </td>
                  <td style={{ padding:'9px 14px' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:5 }}>
                      <div style={{ width:6, height:6, borderRadius:'50%', background:sb.dot }} />
                      <span style={{ fontSize:11, fontWeight:600, color:sb.text, whiteSpace:'nowrap' }}>{r.status}</span>
                    </div>
                  </td>
                  <td style={{ padding:'9px 14px' }}>
                    <span style={{ fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:20, background:gt.bg, color:gt.text }}>{r.gradeType}</span>
                  </td>
                  <td style={{ padding:'9px 14px', maxWidth:200 }}>
                    <span style={{ fontSize:12, color:'#475569', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', display:'block' }}>{r.teacherFeedback || '—'}</span>
                  </td>
                  <td style={{ padding:'9px 14px', textAlign:'right' }}>
                    <button onClick={() => onReview(r._id)}
                      style={{ fontSize:12, fontWeight:600, color:'var(--blue)', background:'none', border:'none', padding:'4px 8px', borderRadius:6 }}>
                      Review
                    </button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{ flexShrink:0, borderTop:'1px solid var(--border)', padding:'8px 14px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <span style={{ fontSize:12, color:'var(--muted)' }}>
          Showing <b style={{ color:'#334155' }}>{Math.min((page-1)*pageSize+1,total)}–{Math.min(page*pageSize,total)}</b> of <b style={{ color:'#334155' }}>{total}</b>
        </span>
        <div style={{ display:'flex', gap:4 }}>
          <button onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1} className="btn btn-ghost" style={{ padding:'4px 10px', fontSize:12, opacity:page===1?0.4:1 }}>← Prev</button>
          {Array.from({length:totalPages},(_,i)=>i+1).map(p=>(
            <button key={p} onClick={()=>setPage(p)} style={{ width:28, height:28, borderRadius:6, border:`1.5px solid ${page===p?'var(--blue)':'var(--border)'}`, background:page===p?'var(--blue-light)':'white', color:page===p?'var(--blue)':'#475569', fontSize:12, fontWeight:page===p?700:400, cursor:'pointer' }}>{p}</button>
          ))}
          <button onClick={()=>setPage(p=>Math.min(totalPages,p+1))} disabled={page===totalPages} className="btn btn-ghost" style={{ padding:'4px 10px', fontSize:12, opacity:page===totalPages?0.4:1 }}>Next →</button>
        </div>
      </div>
    </div>
  );
}

// ── Scheme Tab ─────────────────────────────────────────────────────────────
function SchemeTab({ assessment }) {
  const questions = assessment.questions ?? [];
  const totalMaxPts = questions.reduce((s,q) => s + (q.maxPoints||0), 0);

  return (
    <div style={{ flex:1, minHeight:0, display:'flex', flexDirection:'column', gap:10, overflowY:'auto' }}>
      {/* Overview row */}
      <div style={{ display:'flex', gap:8, flexShrink:0 }}>
        {[
          { label:'Questions', value: questions.length, color:'#6366f1' },
          { label:'Total points', value: totalMaxPts, color:'#2563eb' },
          { label:'Difficulty', value: assessment.difficulty ?? '—', color:'#f59e0b' },
          { label:'Due date', value: fmtDate(assessment.dueDate), color:'#334155' },
        ].map(s => (
          <div key={s.label} className="card" style={{ flex:1, padding:'10px 14px' }}>
            <div style={{ fontSize:16, fontWeight:800, color:s.color, lineHeight:1 }}>{s.value}</div>
            <div style={{ fontSize:10, color:'var(--muted)', marginTop:3, fontWeight:500 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Question breakdown */}
      <div className="card" style={{ overflow:'hidden' }}>
        <div style={{ padding:'10px 16px', borderBottom:'1px solid var(--border)' }}>
          <span style={{ fontSize:11, fontWeight:700, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'0.05em' }}>Question breakdown</span>
        </div>
        <div style={{ overflow:'auto' }}>
          <table style={{ width:'100%', borderCollapse:'collapse' }}>
            <thead>
              <tr style={{ background:'#f8fafc', borderBottom:'1.5px solid var(--border)' }}>
                {['#','Question','Type','Points','Attribute','Answer key'].map((h,i) => (
                  <th key={h} style={{ padding:'8px 14px', fontSize:11, fontWeight:700, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'0.04em', textAlign:'left', whiteSpace:'nowrap' }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {questions.map((q, i) => {
                const tm = TYPE_META[q.type] ?? TYPE_META.short_answer;
                return (
                  <tr key={q._id} className="trow">
                    <td style={{ padding:'9px 14px', fontSize:12, fontWeight:700, color:'var(--muted)' }}>{i+1}</td>
                    <td style={{ padding:'9px 14px', maxWidth:260 }}>
                      <div style={{ fontSize:12, fontWeight:500, color:'#334155', lineHeight:1.5 }}>{q.text}</div>
                      {q.tags?.length > 0 && (
                        <div style={{ display:'flex', gap:4, marginTop:4, flexWrap:'wrap' }}>
                          {q.tags.map(tag => (
                            <span key={tag} style={{ fontSize:10, padding:'1px 6px', borderRadius:20, background:'#f1f5f9', color:'#64748b' }}>{tag}</span>
                          ))}
                        </div>
                      )}
                    </td>
                    <td style={{ padding:'9px 14px' }}>
                      <span style={{ fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:20, background:tm.bg, color:tm.text }}>{tm.label}</span>
                    </td>
                    <td style={{ padding:'9px 14px', fontSize:13, fontWeight:700, color:'#334155' }}>{q.maxPoints}</td>
                    <td style={{ padding:'9px 14px' }}>
                      {q.primaryAttributeId
                        ? <span style={{ fontSize:11, fontWeight:600, color:'#7c3aed', background:'#f3e8ff', padding:'2px 8px', borderRadius:20 }}>{ATTRIBUTES[q.primaryAttributeId] ?? q.primaryAttributeId}</span>
                        : <span style={{ fontSize:11, color:'var(--muted)' }}>—</span>}
                    </td>
                    <td style={{ padding:'9px 14px', maxWidth:220 }}>
                      {q.correctAnswer ? (
                        <div style={{ fontSize:11, color:'#065f46', background:'#f0fdf4', padding:'4px 8px', borderRadius:6, border:'1px solid #bbf7d0', lineHeight:1.5, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                          {q.correctAnswer}
                        </div>
                      ) : <span style={{ fontSize:11, color:'var(--muted)' }}>—</span>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('questions');
  const [toast, setToast] = useState(null);
  const a = ASSESSMENT;
  const sc = STATUS_CONFIG[a.status] ?? STATUS_CONFIG.draft;

  const tabs = [
    { key:'questions', label:'Questions', icon:'list', count: a.questions.length },
    { key:'submissions', label:'Submissions', icon:'user', count: RESULTS.length },
    { key:'scheme', label:'Marking Scheme', icon:'file', count: null },
  ];

  const handleReview = (resultId) => { setTab('questions'); };

  return (
    <div style={{ height:'calc(100vh - 180px)', display:'flex', flexDirection:'column', padding:'12px 16px', overflow:'hidden', gap:8 }}>

      {/* Header bar */}
      <div style={{ flexShrink:0, background:'white', border:'1.5px solid var(--border)', borderRadius:10, padding:'8px 14px', display:'flex', alignItems:'center', gap:10 }}>
        <button className="btn btn-ghost" style={{ padding:'5px 10px', fontSize:12 }}>
          <Icon name="arrowLeft" size={13} /> Assessments
        </button>
        <div style={{ width:1, height:22, background:'var(--border)' }} />
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <span style={{ fontSize:14, fontWeight:700, color:'#0f172a', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{a.name}</span>
            <span style={{ fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:20, background:sc.bg, color:sc.text, flexShrink:0 }}>{a.status}</span>
          </div>
          <div style={{ fontSize:11, color:'var(--muted)', marginTop:2 }}>
            {a.type} · {a.totalPoints} pts · Due {fmtDate(a.dueDate)} · {a.difficulty}
          </div>
        </div>
        <button className="btn btn-ghost" style={{ padding:'5px 10px', fontSize:12, flexShrink:0 }}>
          <Icon name="edit" size={13} /> Edit
        </button>
      </div>

      {/* Tabs */}
      <div style={{ flexShrink:0, display:'flex', gap:4 }}>
        {tabs.map(t => (
          <button key={t.key} onClick={() => setTab(t.key)}
            style={{
              display:'flex', alignItems:'center', gap:6, padding:'7px 14px', borderRadius:8,
              fontSize:13, fontWeight:600, border:'1.5px solid transparent', transition:'all 0.12s', cursor:'pointer',
              background: tab === t.key ? 'white' : 'transparent',
              borderColor: tab === t.key ? 'var(--border)' : 'transparent',
              color: tab === t.key ? 'var(--blue)' : 'var(--muted)',
              boxShadow: tab === t.key ? '0 1px 3px rgba(0,0,0,0.06)' : 'none',
            }}>
            <Icon name={t.icon} size={13} />
            {t.label}
            {t.count != null && (
              <span style={{ fontSize:10, fontWeight:700, background: tab === t.key ? 'var(--blue-light)' : '#f1f5f9', color: tab === t.key ? 'var(--blue)' : 'var(--muted)', padding:'1px 6px', borderRadius:20 }}>{t.count}</span>
            )}
          </button>
        ))}
      </div>

      {/* Tab content */}
      <div style={{ flex:1, minHeight:0, display:'flex', flexDirection:'column' }}>
        {tab === 'questions' && <QuestionsTab questions={a.questions} results={RESULTS} />}
        {tab === 'submissions' && <SubmissionsTab results={RESULTS} onReview={handleReview} />}
        {tab === 'scheme' && <SchemeTab assessment={a} />}
      </div>

      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
